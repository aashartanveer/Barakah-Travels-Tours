<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e7a5f"/>
      <stop offset="1" stop-color="#064e3b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fcd34d"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- ledger book -->
  <rect x="116" y="128" width="280" height="296" rx="24" fill="#fffbeb"/>
  <rect x="116" y="128" width="44" height="296" rx="18" fill="url(#gold)"/>
  <!-- ledger lines -->
  <rect x="190" y="188" width="170" height="14" rx="7" fill="#d1d5db"/>
  <rect x="190" y="236" width="170" height="14" rx="7" fill="#d1d5db"/>
  <rect x="190" y="284" width="110" height="14" rx="7" fill="#d1d5db"/>
  <!-- rupee coin -->
  <circle cx="352" cy="340" r="78" fill="url(#gold)" stroke="#fffbeb" stroke-width="10"/>
  <text x="352" y="372" font-family="Arial, sans-serif" font-size="92" font-weight="bold" fill="#064e3b" text-anchor="middle">₨</text>
</svg>
